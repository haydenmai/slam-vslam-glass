# Usage:
#
#   Build and start the bridge service:
#     docker compose -f docker-slam/docker-compose.bridge.yml up --build ros1_bridge
#
#   Note: This file only contains the ROS1-ROS2 bridge service.
#   Run roscore and ROS2 bag player separately in other containers.

services:
  # ROS1-ROS2 Bridge: connects ROS 1 master to ROS 2 Foxy.
  ros1_bridge:
    build:
      context: ..
      dockerfile: docker-slam/Dockerfile.bridge
    image: local/ros1-ros2-bridge:foxy-noetic
    container_name: ros1_bridge
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://127.0.0.1:11311
      - ROS_DOMAIN_ID=0
      - ROS2_DISTRO=foxy
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
