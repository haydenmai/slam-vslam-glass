services:
  ros2:
    build: .
    container_name: ros2_humble_pi
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///home/linda/cyclone_dds.xml
    volumes:
      - ./src:/home/linda/ros2_ws/src
      - ./cyclone_dds.xml:/home/linda/cyclone_dds.xml
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0       # USB-serial
      - /dev/ttyAMA0:/dev/ttyAMA0       # Pi UART
      - /dev/i2c-1:/dev/i2c-1           # I2C (Pi default bus)
      - /dev/spidev0.0:/dev/spidev0.0   # SPI
    device_cgroup_rules:
      - 'c 189:* rmw'                   # all USB devices
      - 'c 81:* rmw'                    # all video devices
    stdin_open: true
    tty: true